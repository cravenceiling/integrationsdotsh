# Required repository secrets:
# - CLOUDFLARE_API_TOKEN with Workers KV Storage: Read
# - CLOUDFLARE_ACCOUNT_ID for the Cloudflare account that owns DISCOVERY
name: Sync discovered catalog

on:
  schedule:
    - cron: "37 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-discovered
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Count existing discovered domains
        id: before
        run: |
          count=$(bun -e 'const f = Bun.file("sources/discovered.json"); const j = await f.json(); console.log((j.domains ?? []).length)')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Sync from KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run sync:discovered

      - name: Guard against large catalog deletion
        run: |
          before="${{ steps.before.outputs.count }}"
          after=$(bun -e 'const f = Bun.file("sources/discovered.json"); const j = await f.json(); console.log((j.domains ?? []).length)')
          min=$(( before - before / 10 ))
          echo "domains before=$before after=$after min=$min"
          if [ "$after" -lt "$min" ]; then
            echo "Refusing to commit: sources/discovered.json lost more than 10% of domains."
            exit 1
          fi

      - name: Validate batch catalog
        run: bun run validate:batch

      - name: Commit and push changes
        run: |
          if git diff --quiet -- sources/discovered.json; then
            echo "No discovered catalog changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources/discovered.json
          git commit -m "sync discovered catalog from KV"
          git push origin HEAD:main
